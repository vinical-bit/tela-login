<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loguin</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mq.css">
</head>
<body>
    <main>
        <section id="loguin">
            <div id="img">
                
            </div>
            <div id="form">
                <h1>Login</h1>
                <p>Seja Bem-vindo(a) novamente. Faça loguin para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="loguin.php" method="post" autocomplete="on">
                        <div class="campo">
                           <i class="material-icons">person</i>
                            <input type="email" name="user" id="user" required minlength="3" maxlength="30" placeholder="name@gmail.com" autocomplete="email" size="15">
                             <Label for="user">Loguin</Label>
                        </div>
                        <div class="campo">
                            <i class="material-icons">vpn_key</i>
                            <input type="password" name="sen" id="sen" required min="5" max="30" placeholder="senha" autocomplete="current-password" size="15">
                            <Label for="sen">senha</Label>
                        </div>
                        <input type="submit" value="Entrar">
                        <a href="esqueci.html" class="botom">
                            Esqueci a senha <i class="material-icons">mail</i>
                        </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
